<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vkorinloq's Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --neon: #bc13fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Montserrat', sans-serif; overflow: hidden; color: white; background: #000; }

        /* ИСПРАВЛЕННЫЙ ФОНОВЫЙ СЛОЙ */
        #global-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover !important; 
            background-position: center !important;
            background-repeat: no-repeat !important;
            z-index: -2;
            transition: background-image 0.5s ease-in-out;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }

        /* ВЫБОР ФОНА */
        .bg-switcher {
            position: fixed; bottom: 20px; right: 20px; z-index: 5000;
            background: rgba(255,255,255,0.9); padding: 10px 15px; border-radius: 12px;
            border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon);
        }
        .bg-switcher select {
            background: transparent; color: black; border: none; outline: none; 
            cursor: pointer; font-weight: bold; font-family: 'Montserrat';
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            position: fixed; width: 100%; height: 100%; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s ease-in-out;
        }

        .clocks { display: flex; gap: 15px; margin-bottom: 20px; font-size: 0.7rem; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 50px; border: 1px solid var(--neon); }
        .clock-item span { color: var(--neon); font-weight: bold; }

        .auth-card {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 24px; border: 1px solid var(--neon);
            width: 360px; text-align: center;
        }

        /* ОСНОВНОЙ САЙТ */
        #main-app { position: fixed; width: 100%; height: 100%; opacity: 0; pointer-events: none; transition: 1s; }

        nav {
            position: absolute; top: 0; width: 100%; padding: 25px 50px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .nav-links span { margin: 0 15px; cursor: pointer; font-weight: bold; opacity: 0.6; transition: 0.3s; }
        .nav-links span.active { color: var(--neon); opacity: 1; text-shadow: 0 0 10px var(--neon); }

        .tab-content { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .tab-content.active { display: flex; }

        /* ГИФКА СПЕКТРА */
        .spectre-anim { 
            width: 280px; 
            filter: drop-shadow(0 0 25px var(--neon)); 
            margin-bottom: 15px; 
        }

        .social-btn {
            display: flex; align-items: center; gap: 20px; padding: 18px 40px; margin: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon);
            border-radius: 50px; color: white; text-decoration: none; transition: 0.4s;
        }
        .social-btn:hover { transform: scale(1.05); background: rgba(188, 19, 254, 0.2); box-shadow: 0 0 20px var(--neon); }

        input { width: 100%; padding: 14px; margin: 15px 0; background: #111; border: 1px solid #333; color: white; border-radius: 10px; outline: none; }
        
        .btn-enter {
            background: var(--neon); color: white; border: none; padding: 14px;
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: 900;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-enter:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.02); }

        canvas { position: absolute; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="global-bg" style="background-image: url('https://w.forfun.com/fetch/11/11d1377855b766ec06085a67667f3323.jpeg');"></div>
    <div class="overlay"></div>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a7315b.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-switcher">
        <select id="bg-select" onchange="updateGlobalBg(this.value)">
            <option value="mountains">⛰️ ГОРИ</option>
            <option value="forest">🌲 ЛЕС</option>
            <option value="sky">🌌 НЕБО</option>
            <option value="earth">🌍 ЗЕМЛЯ</option>
        </select>
    </div>

    <div id="login-screen">
        <div class="clocks">
            <div class="clock-item">MSK: <span id="msk">00:00</span></div>
            <div class="clock-item">LON: <span id="lon">00:00</span></div>
            <div class="clock-item">WAR: <span id="war">00:00</span></div>
            <div class="clock-item">FRA: <span id="fra">00:00</span></div>
        </div>
        <div class="auth-card">
            <h1 style="letter-spacing:4px; margin-bottom:10px; color: var(--neon);">VKORINLOQ</h1>
            <p style="font-size:0.75rem; color:#aaa; margin-bottom:15px;">Users joined: <span id="reg-count">...</span></p>
            <input type="text" id="user-nick" placeholder="NICKNAME (TG/DS)">
            <button class="btn-enter" onclick="startApp()">Войти на сайт</button>
        </div>
    </div>

    <div id="main-app">
        <nav>
            <div class="nav-links">
                <span id="nav-main" class="active" onclick="showTab('main')">ГЛАВНАЯ</span>
                <span id="nav-social" onclick="showTab('social')">СОЦ-СЕТИ</span>
            </div>
            <div style="cursor:pointer; opacity: 0.6;" onclick="location.reload()"><i class="fas fa-power-off"></i></div>
        </nav>

        <div id="tab-main" class="tab-content active">
            <img src="https://media.tenor.com/jIOfpW5p3J8AAAAd/spectre-dota-2.gif" class="spectre-anim">
            <h2 style="font-size: 2.5rem; letter-spacing: 3px;">АРСЕНЬКА</h2>
            <div style="margin-top:20px; background:rgba(0,0,0,0.7); padding:25px; border-radius:20px; border: 2px solid var(--neon);">
                <p>Дота ПТС: <b style="color:var(--neon)">Много</b></p>
                <p>Возраст: <b style="color:var(--neon)">Достаточно</b></p>
                <p>Рост: <b style="color:var(--neon)">Геометрический</b></p>
                <p>Вес: <b style="color:var(--neon)">Идеал</b></p>
            </div>
        </div>

        <div id="tab-social" class="tab-content">
            <a href="https://t.me/asapfrosty" target="_blank" class="social-btn"><i class="fab fa-telegram" style="color:#26A5E4"></i> Telegram</a>
            <a href="https://steamcommunity.com/profiles/76561199493770952/" target="_blank" class="social-btn"><i class="fab fa-steam"></i> Steam Profile</a>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHdupcoyWmWmSQhuxaGKczKhMI8zyq0VM",
            authDomain: "vkorinloqq.firebaseapp.com",
            projectId: "vkorinloqq",
            databaseURL: "https://vkorinloqq-default-rtdb.firebaseio.com",
            storageBucket: "vkorinloqq.firebasestorage.app",
            messagingSenderId: "239986490775",
            appId: "1:239986490775:web:1d6b7b132eb20db07058d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        setInterval(() => {
            const n = new Date();
            const f = (tz) => new Intl.DateTimeFormat('ru',{hour:'2-digit',minute:'2-digit',timeZone:tz}).format(n);
            document.getElementById('msk').innerText = f('Europe/Moscow');
            document.getElementById('lon').innerText = f('Europe/London');
            document.getElementById('war').innerText = f('Europe/Warsaw');
            document.getElementById('fra').innerText = f('Europe/Berlin');
        }, 1000);

        onValue(ref(db, 'stats/users'), s => { document.getElementById('reg-count').innerText = s.val() || 0; });

        window.startApp = () => {
            const nick = document.getElementById('user-nick').value;
            if(nick.length < 2) return alert("Введите ник!");

            runTransaction(ref(db, 'stats/users'), c => (c || 0) + 1);
            
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                document.getElementById('main-app').style.pointerEvents = 'all';
                initDiamonds();
            }, 800);

            const m = document.getElementById('bg-music');
            m.volume = 0.6;
            m.play();
        };
    </script>

    <script>
        const backgrounds = {
            mountains: "https://w.forfun.com/fetch/11/11d1377855b766ec06085a67667f3323.jpeg",
            forest: "https://w.forfun.com/fetch/f2/f2905e3f269a838522300438ec3011a4.jpeg",
            sky: "https://w.forfun.com/fetch/96/968133560731665a074092b676f62505.jpeg",
            earth: "https://w.forfun.com/fetch/f6/f6756209f82688005b6378e9f5e1f0e4.jpeg"
        };

        function updateGlobalBg(val) {
            document.getElementById('global-bg').style.backgroundImage = `url('${backgrounds[val]}')`;
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-links span').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('nav-'+t).classList.add('active');
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let ds = [];
        function initDiamonds() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<25; i++) ds.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*8+4, sp:Math.random()*1.5+0.5});
            animate();
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ds.forEach(d => {
                d.y += d.sp; if(d.y > canvas.height) d.y = -50;
                ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(Math.PI/4);
                ctx.shadowBlur=15; ctx.shadowColor='#bc13fe'; ctx.fillStyle='rgba(188, 19, 254, 0.8)';
                ctx.fillRect(-d.s/2,-d.s/2,d.s,d.s); ctx.restore();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
