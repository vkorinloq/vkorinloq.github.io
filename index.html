<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vkorinloq's Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Montserrat', sans-serif; overflow: hidden; background: var(--dark-bg); }

        /* ЭКРАН 1: ЛОГИН (ГОРЫ) */
        #login-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .site-title {
            color: white;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
            letter-spacing: 5px;
        }

        .auth-card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--neon-purple);
            width: 90%;
            max-width: 400px;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .auth-tabs { display: flex; margin-bottom: 1.5rem; gap: 10px; }
        .tab-btn { 
            flex: 1; background: none; border: none; color: #888; 
            cursor: pointer; padding: 10px; font-weight: bold; border-bottom: 2px solid transparent;
        }
        .tab-btn.active { color: var(--neon-purple); border-bottom: 2px solid var(--neon-purple); }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(255,255,255,0.1); border: 1px solid #444;
            border-radius: 8px; color: white; outline: none;
        }
        input:focus { border-color: var(--neon-purple); }

        .main-btn {
            width: 100%; padding: 12px; margin-top: 15px;
            background: var(--neon-purple); border: none; border-radius: 8px;
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .main-btn:hover { background: #9d10d6; box-shadow: 0 0 15px var(--neon-purple); }

        /* ЭКРАН 2: ОСНОВНОЙ (НЕОН) */
        #main-screen {
            position: fixed;
            width: 100%; height: 100%;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 1s;
        }

        /* Волна */
        .wave {
            position: absolute; top: 0; left: 0; width: 100%; height: 100px;
            background: url('https://i.stack.imgur.com/S6S7G.png'); /* Фиктивная ссылка для примера формы волны */
            background-color: var(--neon-purple);
            clip-path: ellipse(80% 50% at 50% 0%);
            filter: blur(20px); opacity: 0.3;
        }

        /* Контейнер для ссылок */
        .links-container {
            z-index: 10; display: flex; flex-direction: column; gap: 20px;
        }

        .link-card {
            display: flex; align-items: center; gap: 15px;
            padding: 15px 40px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.3);
            color: white; text-decoration: none;
            font-size: 1.2rem; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .link-card:hover {
            transform: scale(1.1); background: rgba(188, 19, 254, 0.1);
            border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }
        .link-card i { font-size: 1.5rem; }

        /* Холст для ромбиков */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 class="site-title">Vkorinloq's Links</h1>
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">ВХОД</button>
                <button class="tab-btn" onclick="switchTab('reg')">РЕГИСТРАЦИЯ</button>
            </div>
            
            <div id="auth-form">
                <input type="email" id="email" placeholder="Email@gmail.com">
                <input type="text" id="acc-name" placeholder="Account Name" style="display:none;">
                <input type="password" id="password" placeholder="Пароль">
                <button class="main-btn" id="submit-btn" onclick="handleAuth()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <div id="main-screen">
        <div class="wave"></div>
        <canvas id="canvas"></canvas>
        
        <div class="links-container">
            <a href="https://t.me/asapfrosty" target="_blank" class="link-card">
                <i class="fab fa-telegram"></i> Telegram: @asapfrosty
            </a>
            <a href="https://steamcommunity.com/profiles/76561199493770952/" target="_blank" class="link-card">
                <i class="fab fa-steam"></i> Steam Profile
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ТВОИ ДАННЫЕ ИЗ FIREBASE (Вставь их сюда!)
        const firebaseConfig = {
            apiKey: "AIzaSyBHdupcoyWmWmSQhuxaGKczKhMI8zyq0VM",
            authDomain: "vkorinloqq.firebaseapp.com",
            projectId: "vkorinloqq",
            storageBucket: "vkorinloqq.firebasestorage.app",
            messagingSenderId: "239986490775",
            appId: "1:239986490775:web:1d6b7b132eb20db07058d2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.currentMode = 'login';

        window.switchTab = (mode) => {
            window.currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('acc-name').style.display = mode === 'reg' ? 'block' : 'none';
            document.getElementById('submit-btn').innerText = mode === 'reg' ? 'СОЗДАТЬ' : 'ВОЙТИ';
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (window.currentMode === 'reg') {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Аккаунт создан!");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                // Переход на главную
                document.getElementById('login-screen').style.transform = 'translateY(-100%)';
                document.getElementById('main-screen').style.opacity = '1';
                document.getElementById('main-screen').style.pointerEvents = 'all';
                initDiamonds();
            } catch (error) {
                alert("Ошибка: " + error.message);
            }
        };
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let diamonds = [];

        function initDiamonds() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<30; i++) {
                diamonds.push(new Diamond());
            }
            animate();
        }

        class Diamond {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = Math.random() * 15 + 5;
                this.speed = Math.random() * 3 + 1;
                this.history = []; // Для следа
            }
            draw() {
                // Рисуем след
                this.history.forEach((pos, index) => {
                    let opacity = index / this.history.length;
                    ctx.save();
                    ctx.translate(pos.x, pos.y);
                    ctx.rotate(Math.PI / 4);
                    ctx.fillStyle = `rgba(188, 19, 254, ${opacity * 0.3})`;
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.restore();
                });

                // Рисуем сам ромбик
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(Math.PI / 4);
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#bc13fe';
                ctx.fillStyle = '#bc13fe';
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
            update() {
                this.history.push({x: this.x, y: this.y});
                if(this.history.length > 15) this.history.shift();
                
                this.y += this.speed;
                if(this.y > canvas.height + 20) this.reset();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.8)'; // Хвост затухания
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            diamonds.forEach(d => {
                d.update();
                d.draw();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
